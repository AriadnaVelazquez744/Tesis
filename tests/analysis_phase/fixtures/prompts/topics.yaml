# Topic Definitions for Analysis Phase Evaluation Dataset
# Each topic represents a cross-cutting reasoning type that spans multiple domains.
# These are NOT domains — they are cognitive/linguistic reasoning patterns.

topics:

  - id: natural_logic
    abbrev: NLG
    label: "Natural Human Logic"
    description: >
      Queries involving conditional reasoning (if-then), causal relationships
      (A causes B, B is caused by A), counterfactuals (what would happen if X
      were different), temporal ordering (before/after), transitive relations,
      and common-sense entailments. The system must understand that the direction
      of a relation carries semantic meaning — reversing arguments may change
      the truth value or produce a different valid relation.
    reasoning_subtypes:
      - id: conditional
        description: "If X then Y — the truth of Y depends on X"
      - id: causal
        description: "X causes Y — there is a directional generative relationship"
      - id: counterfactual
        description: "What if X were different? — hypothetical reasoning"
      - id: transitive
        description: "X relates to Y relates to Z — chain reasoning"
      - id: temporal
        description: "X before Y after Z — time-ordered relations"
    typical_relation_types_found:
      - ASYMMETRIC
      - INVERSE
      - ORDERING
      - SYMMETRIC
    example_queries:
      - "If my flight is delayed by more than 2 hours, am I entitled to compensation?"
      - "Since it rained this morning, the soccer field will be too wet to play on."
      - "If I had chosen the premium plan last month, would I have gotten free shipping?"

  - id: mathematical_calculation
    abbrev: MATH
    label: "Mathematical Calculations"
    description: >
      Queries involving arithmetic operations (addition, subtraction,
      multiplication, division), percentages, ratios, unit conversions
      (metric/imperial, time zones, currency), comparisons of quantities
      (greater/less than, ranges), aggregations (totals, averages, splits),
      and simple and complex algebraic reasoning. The system must handle numeric values
      precisely and understand that mathematical operations have specific
      directionality (e.g., "A divided by B" is not the same as "B divided by A").
    reasoning_subtypes:
      - id: arithmetic
        description: "Add/subtract/multiply/divide specific numbers"
      - id: percentage
        description: "Find X% of Y, or what percent X is of Y"
      - id: conversion
        description: "Convert between units (miles to km, °F to °C, USD to EUR)"
      - id: aggregation
        description: "Sum, average, split among N people"
      - id: comparative
        description: "Is X greater than Y? By how much?"
    typical_relation_types_found:
      - ASYMMETRIC
      - SYMMETRIC
      - ORDERING
      - FUNCTIONAL
    example_queries:
      - "Calculate 15% tip on $47.50 and split it 3 ways."
      - "If I save $200 per month at 5% APR compounded annually, how much will I have after 2 years?"
      - "Convert 100°F to Celsius and tell me if that's above freezing."

  - id: information_search
    abbrev: INFO
    label: "Information Search"
    description: >
      Queries where the user seeks factual information, definitions, lookups,
      verifications, listings, or comparisons of known entities. Unlike logic
      queries, the primary goal is retrieval of existing knowledge rather than
      reasoning about relationships. However, the system must still extract
      triples representing the factual relationships described (e.g., a capital
      city, a book author, a restaurant's rating).
    reasoning_subtypes:
      - id: lookup
        description: "Find attribute X of entity Y (capital of France, CEO of Company)"
      - id: verification
        description: "Is fact X true? Confirm or deny a proposition"
      - id: listing
        description: "List all X that satisfy condition Y"
      - id: comparison
        description: "Compare X and Y along dimension Z"
      - id: definition
        description: "What does term X mean? Define concept Y"
    typical_relation_types_found:
      - FUNCTIONAL
      - INVERSE
      - ASYMMETRIC
      - SYMMETRIC
    example_queries:
      - "What's the capital of France and what's its timezone?"
      - "List restaurants in Boston that serve Italian food and are open on Sundays."
      - "Is the exchange rate from USD to EUR more favorable at Bank A or Bank B?"

  - id: human_psychology
    abbrev: PSYCH
    label: "Human Psychology"
    description: >
      Queries involving emotional states, social relationships, behavioral
      patterns, cognitive biases, personality traits, interpersonal dynamics,
      and reflective self-awareness. These queries often contain abstract
      relations that are direction-sensitive (e.g., "X fears Y" ≠ "Y fears X"),
      symmetric kinship relations (e.g., "X is sibling of Y" = "Y is sibling of X"),
      and functional dependencies (e.g., "X's personality type is INTJ").
      Some psychology queries may require intents not covered by CLINC150,
      making them natural OOS candidates at the seed level.
    reasoning_subtypes:
      - id: emotional
        description: "I feel X when Y happens — emotional cause-effect"
      - id: social
        description: "How to handle situation X with person Y — interpersonal"
      - id: cognitive_bias
        description: "Why do I always think X? — metacognitive"
      - id: reflective
        description: "What does it mean when I X? — self-analysis"
    typical_relation_types_found:
      - ASYMMETRIC
      - SYMMETRIC
      - INVERSE
      - FUNCTIONAL
    example_queries:
      - "Why do I feel anxious before presentations even when I'm well prepared?"
      - "My partner and I have different communication styles — how can we understand each other better?"
      - "What's the psychological term for when you remember things better when you're in the same mood?"

  - id: mixed
    abbrev: MIX
    label: "Mixed / Cross-Topic Reasoning"
    description: >
      Queries that combine two or more of the above reasoning types, or
      represent edge cases that do not fit neatly into any single category.
      Examples include: math + logic (conditional savings calculation),
      search + psychology (looking up information about psychological concepts),
      logic + search (verifying a factual conditional statement),
      psychology + math (estimating emotional patterns quantitatively),
      or entirely novel reasoning patterns. Also includes intentionally
      ambiguous or malformed queries to test robustness.
    reasoning_subtypes:
      - id: bi_topic
        description: "Combines exactly two of the above topics"
      - id: tri_topic
        description: "Combines three or more topics"
      - id: edge_case
        description: "Malformed, contradictory, off-topic, or deliberately confusing"
    typical_relation_types_found:
      - ASYMMETRIC
      - SYMMETRIC
      - INVERSE
      - ORDERING
      - FUNCTIONAL
    example_queries:
      - "If I save $200/month at 5% APR and feel anxious about market volatility, should I choose a fixed-rate option?"  # math + logic + psych
      - "I want to know what time it is and also I don't want to know what time it is."  # edge case: contradictory
      - "What's the capital of France, and if I fly there from New York, what's the time difference?"  # search + math
