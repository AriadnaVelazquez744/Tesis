services:
  app:
    build:
      context: .
    # Para reutilizar imagen local si construyes varias veces.
    image: tesis:local

    ports:
      - "8501:8501"

    environment:
      # Token de HuggingFace para modelos con acceso restringido.
      HF_TOKEN: ${HF_TOKEN:-}

      # Requerido para inferencia/chatbot si usas un servidor local (ej. LLMStudio).
      LLMSTUDIO_BASE_URL: ${LLMSTUDIO_BASE_URL:-http://host.docker.internal:1234}

      # Endpoint del modelo Vagueness Judge en LM Studio (externo).
      VAGUE_ENDPOINT_URL: ${VAGUE_ENDPOINT_URL:-}

      # Identificador del modelo cargado en LM Studio.
      VAGUE_MODEL_ID: ${VAGUE_MODEL_ID:-}

      # Endpoint del clasificador MIDLM (servidor FastAPI propio, puerto 1235).
      MIDLM_ENDPOINT_URL: ${MIDLM_ENDPOINT_URL:-}

      # Identificador del modelo MIDLM cargado en el servidor.
      MIDLM_MODEL_ID: ${MIDLM_MODEL_ID:-}

      # Endpoint del clasificador TEXTOIR (servidor FastAPI propio, puerto 8081).
      TEXTOIR_ENDPOINT_URL: ${TEXTOIR_ENDPOINT_URL:-}

      # Cache de Hugging Face dentro del contenedor.
      HF_HOME: /root/.cache/huggingface
      # Cache de PyTorch (AMR model y otros) dentro del contenedor.
      TORCH_HOME: /root/.cache/torch

    # Permite acceder al endpoint del host (Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Código runtime montado para desarrollo (edición en caliente).
      - ./src/Vagueness_Judge/runtime:/app/src/Vagueness_Judge/runtime
      - ./src/midlm_textoir_module:/app/src/midlm_textoir_module
      - ./src/TEXTOIR:/app/src/TEXTOIR
      - ./src/Semantic_Grounding:/app/src/Semantic_Grounding

      # Adaptadores entrenados (montados desde training/ para inferencia).
      - ./training/midlm/adapters:/app/training/midlm/adapters
      - ./training/vagueness_judge/adapters:/app/training/vagueness_judge/adapters

      # Resultados y datos persistentes.
      - ./experiments/cao/data/CAO_results:/app/experiments/cao/data/CAO_results
      - ./logs:/app/logs
      - ./storage:/app/storage

      # Cache global de Hugging Face (bind mount al host, para pre-descargar modelos).
      - ./storage/hf_cache:/root/.cache/huggingface

      # Cache de PyTorch (AMR model, torch hub, etc.).
      - ./storage/torch_cache:/root/.cache/torch

