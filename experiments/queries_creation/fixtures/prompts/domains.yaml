# Domain Definitions for Analysis Phase Evaluation Dataset
# Each domain represents a vertical application area with associated CLINC150 intents.
# Domains are used to ensure coverage diversity in the evaluation dataset.

domains:

  - id: banking_finance
    abbrev: BANK
    label: "Banking & Finance"
    description: "Personal banking, credit, investments, taxes, employment benefits, and financial management."
    associated_intents:
      - account_blocked
      - application_status
      - apr
      - balance
      - bill_balance
      - bill_due
      - card_declined
      - credit_limit
      - credit_limit_change
