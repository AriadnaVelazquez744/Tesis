# Relation Type Taxonomy for the Analysis Phase
# Based on Tarski's relation algebra (1941) extended by Maddux (2006).
#
# Every logical triple (Subject, Relation, Object) must have exactly one
# relation type. The type determines how the Logic Transformer and VSA
# processor handle that relation: whether reversal is allowed, whether an
# inverse form exists, and what binding operation to use.
#
# OPERATIONAL MODES (for code implementation):
#   direct              — ASYMMETRIC, ORDERING, FUNCTIONAL
#                         AMR subject is the real subject; keep order as-is.
#   inverse_normalize   — INVERSE
#                         Requires immediate normalisation: swap S↔O and
#                         replace R with R⁻¹ so the triple uses the canonical
#                         active-voice direction.
#   bidirectional       — SYMMETRIC
#                         Duplicate the triple in both (S,R,O) and (O,R,S)
#                         so the VSA creates a non-directional vector space.

relation_types:

  - id: ASYMMETRIC
    label: "Asymmetric"
    operational_mode: direct
    definition: "R(x, y) ⇏ R(y, x) — the relation has a fixed direction; reversing the arguments does not produce a valid equivalent relation."
    properties:
      symmetric: false
      has_inverse: false
      transitive: "sometimes"
      functional: false
    behavior:
      allow_reversal: false
      generate_inverse: false
      vsa_binding: "V = S ⊗ R ⊗ O (single direction only)"
      evaluation: "Test that (O, R, S) produces a different or invalid triple set"
    examples:
      - name: "causation"
        sentence: "Rain causes wet ground"
        forward: ["rain", "causes", "wet_ground"]
        invalid_reverse: ["wet_ground", "causes", "rain"]
      - name: "ownership"
        sentence: "Alice owns Bob's car"
        forward: ["Alice", "owns", "Bob's_car"]
        invalid_reverse: ["Bob's_car", "owns", "Alice"]
    inference_rules:
      - rule: "amr_arg0_arg1"
        description: "Verb in active voice with :ARG0 and :ARG1 roles"
      - rule: "lexical_possession"
        description: "owns, has, belongs_to"
      - rule: "lexical_causal"
        description: "causes, leads_to, results_in, triggers"
      - rule: "fallback"
        description: "Default if no other rule applies"

  - id: INVERSE
    label: "Inverse-Pair"
    operational_mode: inverse_normalize
    definition: "R(x, y) ⇒ R⁻¹(y, x) with R ≠ R⁻¹ — there exists a canonical inverse relation that is lexically different."
    properties:
      symmetric: false
      has_inverse: true
      transitive: "sometimes"
      functional: false
    behavior:
      allow_reversal: true
      generate_inverse: true
      vsa_binding: "V_fact = S ⊗ R ⊗ O and V_rev = O ⊗ R⁻¹ ⊗ S coexist"
      evaluation: "Test that both forms are produced and are semantically equivalent"
    examples:
      - name: "parent-child"
        sentence: "Alice is the parent of Bob"
        forward: ["Alice", "is_parent_of", "Bob"]
        inverse: ["Bob", "is_child_of", "Alice"]
      - name: "author-work"
        sentence: "Tolstoy wrote War and Peace"
        forward: ["Tolstoy", "wrote", "War and Peace"]
        inverse: ["War and Peace", "was_written_by", "Tolstoy"]
    inference_rules:
      - rule: "amr_passive"
        description: "Verb in passive voice (detected by auxiliary 'be' + past participle)"
      - rule: "lexical_kinship_asymmetric"
        description: "father, mother, parent, son, daughter, child, uncle, aunt, nephew, niece"

  - id: SYMMETRIC
    label: "Symmetric"
    operational_mode: bidirectional
    definition: "R(x, y) ⇔ R(y, x) — the direction of the arguments does not change the truth value."
    properties:
      symmetric: true
      has_inverse: false
      transitive: "sometimes"
      functional: false
    behavior:
      allow_reversal: true
      generate_inverse: false  # R = R⁻¹, so no distinct inverse needed
      vsa_binding: "V = S ⊗ R ⊗ O ≈ O ⊗ R ⊗ S (in the VSA space)"
      evaluation: "Test that both orderings produce approximately the same hypervector"
    examples:
      - name: "kinship-symmetric"
        sentence: "Alice is Bob's sibling"
        forward: ["Alice", "is_sibling_of", "Bob"]
        reverse: ["Bob", "is_sibling_of", "Alice"]
      - name: "equality"
        sentence: "The exchange rate for USD to EUR equals the rate for EUR to USD (assuming mid-market)"
        forward: ["USD_rate", "equals", "EUR_rate"]
        reverse: ["EUR_rate", "equals", "USD_rate"]
    inference_rules:
      - rule: "lexical_mutuality"
        description: "each other, mutually, together, both"
      - rule: "lexical_equality"
        description: "equals, same_as, equivalent_to"
      - rule: "lexical_kinship_symmetric"
        description: "brother, sister, spouse, cousin, partner"

  - id: ORDERING
    label: "Ordering"
    operational_mode: direct
    definition: "R(x, y) ∧ R(y, z) ⇒ R(x, z) (transitivity) and R(x, y) ⇒ ¬R(y, x) (antisymmetry) — defines a partial or total order."
    properties:
      symmetric: false
      has_inverse: true
      transitive: true
      functional: false
    behavior:
      allow_reversal: true
      generate_inverse: true
      inverse_definition: "¬R(y, x) — the inverse is the complement of the original"
      vsa_binding: "V = S ⊗ R ⊗ O with a negation operator for the inverse"
      evaluation: "Test transitive consistency: R(x,y) + R(y,z) ⇒ R(x,z)"
    examples:
      - name: "greater-than"
        sentence: "10 is greater than 5"
        forward: ["10", "greater_than", "5"]
        inverse: ["5", "less_than", "10"]
      - name: "before-after"
        sentence: "My meeting is before lunch"
        forward: ["meeting", "is_before", "lunch"]
        inverse: ["lunch", "is_after", "meeting"]
    inference_rules:
      - rule: "preposition_directional"
        description: "before/after, above/below, over/under, into/from"
      - rule: "lexical_comparative"
        description: "greater_than, less_than, more_than, fewer_than, faster_than, older_than"

  - id: FUNCTIONAL
    label: "Functional"
    operational_mode: direct
    definition: "∀x ∃!y : R(x, y) — each element in the domain maps to exactly one element in the codomain. Also supports reverse lookup: given y, can recover the unique x."
    properties:
      symmetric: false
      has_inverse: true
      transitive: false
      functional: true
    behavior:
      allow_reversal: true
      generate_inverse: true
      inverse_definition: "f⁻¹(y) = x — bi-directional mapping through the unique identifier"
      vsa_binding: "V = S ⊗ R ⊗ O with uniqueness constraint"
      evaluation: "Test that lookup and reverse-lookup are consistent"
    examples:
      - name: "capital-city"
        sentence: "Paris is the capital of France"
        forward: ["Paris", "is_capital_of", "France"]
        reverse: ["France", "has_capital", "Paris"]
      - name: "unique-identifier"
        sentence: "My account number is 12345678"
        forward: ["my_account", "has_number", "12345678"]
        reverse: ["account_12345678", "belongs_to", "my_account"]
    inference_rules:
      - rule: "lexical_location"
        description: "in, at, located_in, situated_in, based_in"
      - rule: "unique_identification"
        description: "has_id, has_number, has_code, is_ssn_of"
